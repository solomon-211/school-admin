version: '3.9'

services:
  mongo:
    image: mongo:7
    container_name: school_admin_mongo
    restart: unless-stopped
    volumes:
      - mongo_admin_data:/data/db
    ports:
      - "27018:27017"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: school_admin_backend
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      MONGO_URI: mongodb://mongo:27017/school_admin
    ports:
      - "5002:5002"
    depends_on:
      - mongo

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: school_admin_frontend
    restart: unless-stopped
    ports:
      - "3001:80"
    depends_on:
      - backend

volumes:
  mongo_admin_data:
